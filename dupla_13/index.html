<!--13. Crie um código usando PHP + HTML com um formulário com um campo solicitando uma medida em metros.
Ao clicar no botão, o PHP deverá converter esse valor para centímetros e exibir o resultado.-->

<body>
    <h2>Converter metros para centímetros</h2>
    <form action="processa.php" method="post">
        <label>Medida em metros:</label><br>
        <input type="number" step="0.01" name="metro" required><br><br>

        <input type="submit">
    </form>
</body>
