<!--6. Crie um código usando PHP + HTML com um formulário com um campo solicitando o nome de um produto e outro campo solicitando seu preço.
Ao clicar no botão, o PHP deverá exibir o nome do produto e o preço informado.-->

<body>
    <h2>identificador de produto</h2>
    <form method="post" action="processa.php">
        <label>Nome do produto:</label><br>
        <input type="text" name="nome"><br><br>

        <label>Valor do produto:</label><br>
        <input type="number" step="0.01" name="valor"><br><br>

        <input type="submit" value="Enviar Produto">

    </form>


</body>
