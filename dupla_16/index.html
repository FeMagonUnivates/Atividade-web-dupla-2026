<!--Crie um código usando PHP + HTML com um formulário com dois campos: o valor total de uma conta de restaurante e a quantidade de pessoas que vão dividir a mesa.
Ao clicar no botão, o PHP deverá calcular e exibir o valor exato que cada pessoa deverá pagar.-->

<body>
    <h2>Calculadora de pagamento</h2>
    <form action="processa.php" method="post">
        <label>Valor da conta:</label>
        <input type="number" step="0.01" name="valor"><br><br>

        <label>Quantidade de pessoas:</label>
        <input type="number" name="pessoas"><br><br>

        <input type="submit">
    </form>
    
</body>
</html>
