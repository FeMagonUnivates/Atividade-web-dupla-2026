<!--11. Crie um código usando PHP + HTML com um formulário com um campo solicitando o preço original de um produto.
Ao clicar no botão, o PHP deverá calcular o valor do produto com um desconto de 10% e mostrar o preço final.-->

<body>
    <h2>Valor do prouto com desconto</h2>
    <form action="processa.php" method="post">
        <label>Preço do produto:</label><br>
        <input type="number" step="0.01" name="preco" required><br><br>

        <input type="submit" value="Enviar para calcular o desconto">
    </form>
</body>
