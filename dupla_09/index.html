<!--9. Crie um código usando PHP + HTML com um formulário com dois campos solicitando a base e a altura de um retângulo.
Ao clicar no botão, o PHP deverá calcular e exibir a área do retângulo (Área = base * altura).-->

<body>
    <h2>Área de um retângulo</h2>
    <form action="processa.php" method="post">
        <label>Tamanho da base:</label><br>
        <input type="number" step="0.01" name="base" required><br><br>
        
        <label>Tamanho altura:</label><br>
        <input type="number" step="0.01" name="altura" required><br><br>

        <input type="submit" value="Enviar para calcular área">
    </form>
</body>

</html>
