<!--1. Crie um código usando PHP + HTML com um formulário com dois campos solicitando notas ao usuário.
Ao clicar no botão, o PHP deverá calcular a média das duas notas e mostrar o resultado na te-->

<body>
    <h2>Média de notas</h2>
    <form action="processa.php" method="post">
        <label>Primeira nota:</label><br>
        <input type="number" step="0.01" name="num1" required><br><br>

        <label>Segunda nota:</label><br>
        <input type="number" step="0.01" name="num2" required><br><br>

        <input type="submit" value="Enviar dados">
    </form>
</body>
