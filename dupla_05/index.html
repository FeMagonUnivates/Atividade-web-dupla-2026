<!--5. Crie um código usando PHP + HTML com um formulário com um campo solicitando a temperatura em graus Celsius.
Ao clicar no botão, o PHP deverá converter o valor para Fahrenheit e exibir o resultado.
F = C * 1.8 + 32-->

<body>
    <h2>Converter para Fahrenheit</h2>
    <form action="processa.php" method="post">
        <label>Temperatura em graus Celsius:</label><br>
        <input type="number" step="0.01" name="celsius" required><br><br>

        <input type="submit" value="Enviar graus">
    </form>
</body>
